<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星神の封印 ── 時代の層</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho+B1:wght@700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  background:#050302;
  overflow:hidden;
  font-family:'Noto Sans JP',sans-serif;
  color:#f0e2c8;
  touch-action:none;
}

/* ── ヘッダー ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:.55rem 1rem .45rem;
  background:linear-gradient(180deg,rgba(5,3,2,1) 60%,transparent);
  display:flex;align-items:center;justify-content:space-between;
  gap:.5rem;
}
#hdr h1{
  font-family:'Shippori Mincho B1',serif;
  font-size:1.05rem;letter-spacing:.1em;color:#f0d060;
  white-space:nowrap;
}
.hbtns{display:flex;gap:.4rem;}
.hbtn{
  font-size:.6rem;padding:.3rem .6rem;
  background:#1e1408;border:1px solid #c9922a;
  color:#e8b84b;border-radius:4px;cursor:pointer;
  white-space:nowrap;letter-spacing:.05em;
  transition:background .15s;
}
.hbtn:hover{background:#2a1e08;}
.hbtn.active{background:#3a2a08;border-color:#f0d060;color:#f0d060;}

/* ── 3D ステージ ── */
#stage{
  position:fixed;inset:0;
  perspective:1200px;
  perspective-origin:50% 40%;
  overflow:hidden;
}
#world{
  position:absolute;
  width:900px;height:700px;
  top:50%;left:50%;
  transform-style:preserve-3d;
  transform-origin:center center;
  /* JS で制御 */
}

/* ── 時代プレート（面） ── */
.era-plate{
  position:absolute;
  transform-style:preserve-3d;
  pointer-events:none;
}
.era-face{
  position:absolute;
  border-radius:16px;
  opacity:.18;
  pointer-events:none;
}
.era-label-3d{
  position:absolute;
  font-family:'Shippori Mincho B1',serif;
  font-size:.75rem;letter-spacing:.25em;
  font-weight:700;
  pointer-events:none;
  white-space:nowrap;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
}

/* ── SVG 接続線 ── */
#svg-lines{
  position:absolute;
  width:900px;height:700px;
  top:0;left:0;
  transform-style:preserve-3d;
  pointer-events:none;
  overflow:visible;
}

/* ── ノードカード ── */
.nd{
  position:absolute;
  transform-style:preserve-3d;
  cursor:pointer;
  user-select:none;
}
.card{
  position:relative;
  border-radius:10px;
  padding:.6rem .85rem;
  text-align:center;
  min-width:96px;
  box-shadow:0 6px 24px rgba(0,0,0,.8);
  transition:transform .15s, box-shadow .15s;
  backface-visibility:hidden;
}
.nd:hover .card{
  transform:scale(1.08) translateZ(8px);
  box-shadow:0 12px 32px rgba(0,0,0,.9);
}
.nd:active .card{transform:scale(.95);}

.card-icon{font-size:1.4rem;line-height:1;margin-bottom:.18rem;}
.card-name{font-size:.82rem;font-weight:700;letter-spacing:.05em;line-height:1.3;}
.card-role{font-size:.55rem;color:#a09080;margin-top:.18rem;line-height:1.4;}

/* カテゴリ */
.c-star .card{background:#1e1506;border:3px solid #e8b84b;box-shadow:0 0 24px rgba(232,184,75,.4),0 6px 24px rgba(0,0,0,.8);}
.c-star .card-name{color:#f0d060;}
.c-deity .card{background:#1a1506;border:2px solid #c9922a;}
.c-deity .card-name{color:#f0c84a;}
.c-clan .card{background:#0c1a28;border:2px solid #6a8aaa;}
.c-clan .card-name{color:#9ac4e8;}
.c-hero .card{background:#280808;border:2px solid #cc3333;}
.c-hero .card-name{color:#ff8888;}
.c-shogun .card{background:#082018;border:2px solid #2a8e52;}
.c-shogun .card-name{color:#5de89a;}
.c-crow .card{background:#160a20;border:2px dashed #8a5ab8;}
.c-crow .card-name{color:#c898e8;}
.c-place .card{background:#120e04;border:2px dashed #7a5a18;}
.c-place .card-name{color:#d8b850;}

/* ── 凡例 ── */
#legend{
  position:fixed;bottom:.8rem;left:.8rem;z-index:100;
  display:flex;flex-direction:column;gap:.3rem;
}
.leg{display:flex;align-items:center;gap:.4rem;font-size:.58rem;color:#c8b89a;}
.ldot{width:10px;height:10px;border-radius:2px;}

/* ── 操作ヒント ── */
#hint{
  position:fixed;bottom:.8rem;right:.8rem;z-index:100;
  font-size:.58rem;color:#c9922a;
  background:#150f05;border:1px solid #3a2a08;
  padding:.35rem .7rem;border-radius:6px;
  line-height:1.8;text-align:right;
}

/* ══════ MODAL ══════ */
#ov{
  display:none;position:fixed;inset:0;
  background:rgba(4,2,1,.93);backdrop-filter:blur(10px);
  z-index:200;align-items:flex-end;justify-content:center;
}
#ov.open{display:flex;}
#modal{
  background:#150f05;
  border:3px solid #c9922a;border-bottom:none;
  border-radius:16px 16px 0 0;
  width:100%;max-width:560px;
  max-height:75vh;overflow-y:auto;
  padding:1.4rem 1.4rem 2rem;
  position:relative;
  animation:sup .28s cubic-bezier(.22,1,.36,1);
}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
#modal::before{
  content:'';display:block;
  width:40px;height:4px;border-radius:2px;
  background:#2a1e08;margin:0 auto 1rem;
}
#mcl{
  position:absolute;top:1.1rem;right:1.1rem;
  font-size:1.4rem;color:#6a5040;cursor:pointer;
  background:none;border:none;line-height:1;transition:color .15s;
}
#mcl:hover{color:#f0e2c8;}
#micon{font-size:2rem;margin-bottom:.3rem;}
#mtitle{font-family:'Shippori Mincho B1',serif;font-size:1.2rem;font-weight:700;letter-spacing:.08em;color:#e8b84b;margin-bottom:.18rem;}
#msub{font-size:.7rem;color:#c9922a;margin-bottom:.9rem;letter-spacing:.04em;}
.ms{margin-bottom:.85rem;}
.mst{font-size:.65rem;font-weight:700;letter-spacing:.18em;color:#c9922a;margin-bottom:.3rem;padding-bottom:.22rem;border-bottom:1px solid #2a1a08;}
.msb{font-size:.82rem;line-height:1.9;color:#c8b89a;}
.msb strong{color:#f0e2c8;}
.msb em{color:#e8b84b;font-style:normal;}
.mlinks{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.85rem;}
.mlbtn{font-size:.65rem;padding:.28rem .65rem;background:#1e1408;border:1px solid #c9922a;border-radius:4px;color:#e8b84b;cursor:pointer;letter-spacing:.04em;transition:background .12s;}
.mlbtn:hover{background:#2a1e08;}
.mera{display:inline-block;font-size:.58rem;padding:.12rem .45rem;border-radius:3px;margin-bottom:.6rem;letter-spacing:.1em;font-weight:700;}
</style>
</head>
<body>

<div id="hdr">
  <h1>⭐ 星神の封印 ── 時代の層</h1>
  <div class="hbtns">
    <div class="hbtn active" id="btn-3d" onclick="setMode('3d')">3D表示</div>
    <div class="hbtn" id="btn-flat" onclick="setMode('flat')">平面表示</div>
  </div>
</div>

<div id="stage">
  <div id="world">
    <!-- SVG lines -->
    <svg id="svg-lines" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div id="legend">
  <div class="leg"><div class="ldot" style="background:#1e1506;border:2px solid #e8b84b;"></div>星神・核</div>
  <div class="leg"><div class="ldot" style="background:#1a1506;border:2px solid #c9922a;"></div>神話・神格</div>
  <div class="leg"><div class="ldot" style="background:#0c1a28;border:2px solid #6a8aaa;"></div>氏族・権力</div>
  <div class="leg"><div class="ldot" style="background:#280808;border:2px solid #cc3333;"></div>英雄・怨霊</div>
  <div class="leg"><div class="ldot" style="background:#082018;border:2px solid #2a8e52;"></div>幕府・近世</div>
  <div class="leg"><div class="ldot" style="background:#160a20;border:2px dashed #8a5ab8;"></div>天皇家・烏</div>
</div>
<div id="hint">ドラッグ：回転<br>ピンチ：拡縮<br>タップ：詳細</div>

<!-- MODAL -->
<div id="ov" onclick="closeOv(event)">
<div id="modal">
  <button id="mcl" onclick="closeModal()">✕</button>
  <div id="micon"></div>
  <div id="mtitle"></div>
  <div id="msub"></div>
  <div id="mcont"></div>
  <div id="mlinks" class="mlinks"></div>
</div>
</div>

<script>
// ════════════════════════════════
//  時代定義（奥行き Z 値と色）
// ════════════════════════════════
const ERAS=[
  {id:'myth',  label:'神 話 層',   z: 240, color:'#c9922a', bg:'rgba(201,146,42,.12)'},
  {id:'tenn',  label:'天 皇 家 東 征', z: 120, color:'#8a5ab8', bg:'rgba(138,90,184,.10)'},
  {id:'koten', label:'古 代 氏 族 層', z:   0, color:'#6a8aaa', bg:'rgba(106,138,170,.10)'},
  {id:'chuse', label:'中 世 層',   z:-140, color:'#cc3333',  bg:'rgba(204,51,51,.10)'},
  {id:'kinse', label:'近 世 層',   z:-280, color:'#2a8e52',  bg:'rgba(42,142,82,.10)'},
];

// ════════════════════════════════
//  ノード定義
//  x,y: ワールド平面座標（900x700基準）
//  era: 時代ID → Z値を参照
// ════════════════════════════════
const NODES=[
  // 神話層
  {id:'ama', era:'myth',  cat:'c-star',   x:450, y:160, icon:'⭐', name:'アマツミカボシ\n（天津甕星）', role:'まつろわぬ星神・封印の核', did:'amatsumikaboshi'},
  {id:'fut', era:'myth',  cat:'c-deity',  x:220, y:280, icon:'⚡', name:'経津主神\n（フツヌシ）',     role:'物部系・香取神宮',         did:'futsunushi'},
  {id:'tak', era:'myth',  cat:'c-deity',  x:680, y:280, icon:'⚡', name:'武甕槌神\n（タケミカヅチ）', role:'藤原系・鹿島神宮',         did:'takemikazuchi'},
  {id:'omi', era:'myth',  cat:'c-deity',  x:450, y:310, icon:'🗿', name:'建葉槌命',                  role:'倭文氏・宿魂石の番人',      did:'omika'},
  // 天皇家東征層
  {id:'yat', era:'tenn',  cat:'c-crow',   x:200, y:200, icon:'🐦‍⬛', name:'八咫烏\n（ヤタガラス）',  role:'天皇家東征・光の道案内',   did:'yatagarasu'},
  // 古代氏族層
  {id:'mon', era:'koten', cat:'c-clan',   x:200, y:280, icon:'🏛', name:'物部氏',                   role:'十種神宝・鎮魂法・石見〜東国',did:'mononobe'},
  {id:'fuj', era:'koten', cat:'c-clan',   x:700, y:280, icon:'🏛', name:'藤原氏',                   role:'摂関政治・中央権力',        did:'fujiwara'},
  // 中世層
  {id:'chi', era:'chuse', cat:'c-clan',   x:260, y:260, icon:'🏹', name:'千葉氏',                   role:'妙見（北極星）信仰・下総',  did:'chiba'},
  {id:'mas', era:'chuse', cat:'c-hero',   x:500, y:300, icon:'⚔', name:'平 将門',                  role:'新皇・北斗七星化身・怨霊',  did:'masakado'},
  // 近世層
  {id:'iye', era:'kinse', cat:'c-shogun', x:500, y:240, icon:'🏯', name:'徳川 家康',                role:'江戸・全封印の統合者',      did:'ieyasu'},
  {id:'kan', era:'kinse', cat:'c-place',  x:300, y:380, icon:'👁', name:'将門首塚\n神田明神',        role:'大手町・鬼門封印',          did:'kanda'},
  {id:'kas', era:'kinse', cat:'c-place',  x:700, y:380, icon:'⛩', name:'鹿島・香取\n神宮',          role:'要石・東国守護軸',          did:'kashima'},
];

// ════════════════════════════════
//  関係線定義
// ════════════════════════════════
const RELS=[
  {f:'omi', t:'ama', l:'宿魂石に封印',     c:'#e8b84b', w:3},
  {f:'fut', t:'ama', l:'討伐',             c:'#c9922a', w:2},
  {f:'tak', t:'ama', l:'討伐',             c:'#c9922a', w:2},
  {f:'yat', t:'ama', l:'光 vs 闇',         c:'#9a6ab8', w:1.5, d:'5,4'},
  {f:'mon', t:'fut', l:'奉斎',             c:'#7a9ab8', w:1.5, d:'5,4'},
  {f:'fuj', t:'tak', l:'奉斎',             c:'#7a9ab8', w:1.5, d:'5,4'},
  {f:'mon', t:'chi', l:'残党逃亡説',       c:'#7a9ab8', w:1.5, d:'4,5'},
  {f:'fuj', t:'chi', l:'委任統治',         c:'#7a9ab8', w:1,   d:'6,4'},
  {f:'chi', t:'mas', l:'同族・妙見で昇華', c:'#cc3333', w:2},
  {f:'mas', t:'ama', l:'北斗七星化身',     c:'#cc3333', w:1.5, d:'4,4'},
  {f:'iye', t:'mas', l:'怨霊→守護神転用', c:'#2a8e52', w:2},
  {f:'iye', t:'ama', l:'日光真北封印',     c:'#2a8e52', w:2,   d:'3,4'},
  {f:'iye', t:'kas', l:'東の守護軸',       c:'#2a8e52', w:1.5},
  {f:'mas', t:'kan', l:'首塚・神田明神',   c:'#cc3333', w:1.5},
  {f:'iye', t:'kan', l:'鬼門に配置',       c:'#2a8e52', w:1.5},
];

// ═══════════════════════════════════════
//  3D 座標計算
// ═══════════════════════════════════════
function getEraZ(eraId){
  const e=ERAS.find(e=>e.id===eraId);
  return e?e.z:0;
}

// ワールド座標（中心基準）
function nodeWorld(n){
  return {
    x: n.x - 450,
    y: n.y - 350,
    z: getEraZ(n.era)
  };
}

// ノードマップ
const nodeMap={};
NODES.forEach(n=>nodeMap[n.id]=n);

// ═══════════════════════════════════════
//  DOM 構築
// ═══════════════════════════════════════
const world=document.getElementById('world');

// 時代プレート（背景面）
ERAS.forEach(era=>{
  const plate=document.createElement('div');
  plate.className='era-plate';
  plate.style.cssText=`
    width:820px;height:480px;
    left:-410px;top:-240px;
    transform:translateZ(${era.z}px);
  `;
  // 面
  const face=document.createElement('div');
  face.className='era-face';
  face.style.cssText=`
    inset:0;background:${era.bg};
    border:1px solid ${era.color};
    border-radius:16px;
    box-shadow: inset 0 0 40px rgba(0,0,0,.3);
  `;
  plate.appendChild(face);
  // ラベル
  const lbl=document.createElement('div');
  lbl.className='era-label-3d';
  lbl.style.cssText=`
    top:-1.4rem;left:1.2rem;
    color:${era.color};
    font-size:.75rem;letter-spacing:.3em;
  `;
  lbl.textContent=era.label;
  plate.appendChild(lbl);
  world.appendChild(plate);
});

// ノードカード
NODES.forEach(n=>{
  const el=document.createElement('div');
  el.className=`nd ${n.cat}`;
  el.id='nd-'+n.id;
  el.dataset.did=n.did;
  const z=getEraZ(n.era);
  el.style.cssText=`
    left:${n.x-450}px;top:${n.y-350}px;
    transform:translateZ(${z}px) translate(-50%,-50%);
  `;
  const nameParts=n.name.split('\n');
  el.innerHTML=`
    <div class="card">
      <div class="card-icon">${n.icon}</div>
      <div class="card-name">${nameParts.join('<br>')}</div>
      <div class="card-role">${n.role}</div>
    </div>
  `;
  el.addEventListener('click',e=>{
    e.stopPropagation();
    openModal(n.did);
  });
  world.appendChild(el);
});

// ═══════════════════════════════════════
//  SVG 関係線
// ═══════════════════════════════════════
function drawLines(){
  const svg=document.getElementById('svg-lines');
  svg.innerHTML='';

  // arrowhead defs
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const arrowColors=['#e8b84b','#c9922a','#cc3333','#2a8e52','#7a9ab8','#9a6ab8'];
  arrowColors.forEach(c=>{
    const m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    const mid='arr'+c.replace(/[^a-f0-9]/gi,'');
    m.setAttribute('id',mid);
    m.setAttribute('markerWidth','7');m.setAttribute('markerHeight','7');
    m.setAttribute('refX','6');m.setAttribute('refY','3');m.setAttribute('orient','auto');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M0,0 L0,6 L7,3 z');p.setAttribute('fill',c);p.setAttribute('opacity','.8');
    m.appendChild(p);defs.appendChild(m);
  });
  svg.appendChild(defs);

  RELS.forEach(r=>{
    const fn=nodeMap[r.f], tn=nodeMap[r.t];
    if(!fn||!tn)return;

    // SVGはZ軸を無視した2D射影で描画（3D感はCSS perspective任せ）
    // Z差を y方向に少し投影して奥行き感を出す
    const fz=getEraZ(fn.era), tz=getEraZ(tn.era);
    const proj=0.08; // Z → Y の射影係数
    const fx=fn.x-450, fy=fn.y-350 - fz*proj;
    const tx2=tn.x-450, ty2=tn.y-350 - tz*proj;

    const mx=(fx+tx2)/2+(fy-ty2)*0.18;
    const my=(fy+ty2)/2-(fx-tx2)*0.18;

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${fx},${fy} Q${mx},${my} ${tx2},${ty2}`);
    path.setAttribute('stroke',r.c||'#c9922a');
    path.setAttribute('stroke-width',r.w||1.5);
    path.setAttribute('fill','none');
    path.setAttribute('opacity','0.7');
    if(r.d) path.setAttribute('stroke-dasharray',r.d);
    const mid2='arr'+(r.c||'#c9922a').replace(/[^a-f0-9]/gi,'');
    path.setAttribute('marker-end',`url(#${mid2})`);
    svg.appendChild(path);

    if(r.l){
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',mx);t.setAttribute('y',my-7);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','9');
      t.setAttribute('fill',r.c||'#c9922a');
      t.setAttribute('font-family','Noto Sans JP,sans-serif');
      t.setAttribute('opacity','0.9');
      t.textContent=r.l;
      svg.appendChild(t);
    }
  });
}
drawLines();

// ═══════════════════════════════════════
//  3D 回転制御
// ═══════════════════════════════════════
let rotX=18, rotY=-12, scale=1.0;
let mode='3d';
let dragging=false, lastX=0, lastY=0;

function applyTransform(){
  if(mode==='3d'){
    world.style.transform=`
      translateZ(0px)
      scale(${scale})
      rotateX(${rotX}deg)
      rotateY(${rotY}deg)
    `;
    document.getElementById('hint').textContent='ドラッグ：回転\nピンチ：拡縮\nタップ：詳細';
  } else {
    world.style.transform=`scale(${scale}) rotateX(0deg) rotateY(0deg)`;
    document.getElementById('hint').textContent='ドラッグ：移動\nピンチ：拡縮\nタップ：詳細';
  }
}

function setMode(m){
  mode=m;
  document.getElementById('btn-3d').classList.toggle('active',m==='3d');
  document.getElementById('btn-flat').classList.toggle('active',m==='flat');
  if(m==='3d'){rotX=18;rotY=-12;}
  else{rotX=0;rotY=0;}
  applyTransform();
}

applyTransform();

// マウスドラッグ
const stage=document.getElementById('stage');
let panX=0,panY=0;

stage.addEventListener('mousedown',e=>{
  if(e.target.closest('.nd'))return;
  dragging=true;lastX=e.clientX;lastY=e.clientY;
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if(mode==='3d'){
    rotY+=dx*0.35;
    rotX-=dy*0.35;
    rotX=Math.max(-55,Math.min(55,rotX));
  }else{
    // 平面モードはパン
    const st=world.style.transform;
    // 位置移動はCSS marginで
    panX+=dx;panY+=dy;
    world.style.marginLeft=panX+'px';
    world.style.marginTop=panY+'px';
  }
  lastX=e.clientX;lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup',()=>dragging=false);

// ホイール
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  scale=Math.max(.3,Math.min(2.2,scale*(e.deltaY>0?.92:1.09)));
  applyTransform();
},{passive:false});

// タッチ
let touches2=[], lastDist2=0;
stage.addEventListener('touchstart',e=>{
  touches2=Array.from(e.touches);
  lastX=touches2[0].clientX;lastY=touches2[0].clientY;
  if(touches2.length===2){
    lastDist2=Math.hypot(
      touches2[0].clientX-touches2[1].clientX,
      touches2[0].clientY-touches2[1].clientY
    );
  }
},{passive:true});

stage.addEventListener('touchmove',e=>{
  e.preventDefault();
  const cur=Array.from(e.touches);
  if(cur.length===2&&lastDist2>0){
    const d=Math.hypot(
      cur[0].clientX-cur[1].clientX,
      cur[0].clientY-cur[1].clientY
    );
    scale=Math.max(.3,Math.min(2.2,scale*(d/lastDist2)));
    lastDist2=d;
  } else if(cur.length===1){
    const dx=cur[0].clientX-lastX, dy=cur[0].clientY-lastY;
    if(mode==='3d'){
      rotY+=dx*0.4;
      rotX-=dy*0.4;
      rotX=Math.max(-55,Math.min(55,rotX));
    }else{
      panX+=dx;panY+=dy;
      world.style.marginLeft=panX+'px';
      world.style.marginTop=panY+'px';
    }
    lastX=cur[0].clientX;lastY=cur[0].clientY;
  }
  applyTransform();
},{passive:false});

stage.addEventListener('touchend',e=>{
  if(e.touches.length<2)lastDist2=0;
  touches2=Array.from(e.touches);
},{passive:true});

// ─── モーダル開閉 ───
function openModal(id){
  const d=D[id];if(!d)return;
  const eraLabel=ERA_LABELS[d.era]||'';
  const eraColor=ERA_COLORS[d.era]||'#c9922a';
  document.getElementById('micon').textContent=d.icon;
  document.getElementById('mtitle').textContent=d.title;
  document.getElementById('msub').innerHTML=
    `<span class="mera" style="background:${eraColor}22;border:1px solid ${eraColor};color:${eraColor};">${eraLabel}</span> ${d.sub}`;
  let html='';
  d.secs.forEach(s=>{
    html+=`<div class="ms"><div class="mst">${s.t}</div><div class="msb">${s.b}</div></div>`;
  });
  document.getElementById('mcont').innerHTML=html;
  let lh='';
  if(d.links&&d.links.length){
    lh='<div style="font-size:.62rem;color:#c9922a;width:100%;letter-spacing:.15em;margin-bottom:.38rem;font-weight:700;">関連する人物・場所</div>';
    d.links.forEach(lid=>{
      const ld=D[lid];
      if(ld) lh+=`<div class="mlbtn" onclick="openModal('${lid}')">${ld.icon} ${ld.title.substring(0,14)}</div>`;
    });
  }
  document.getElementById('mlinks').innerHTML=lh;
  document.getElementById('ov').classList.add('open');
  document.getElementById('modal').scrollTop=0;
}
function closeModal(){document.getElementById('ov').classList.remove('open');}
function closeOv(e){if(e.target===document.getElementById('ov'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ─── 自動回転（アイドル時） ───
let autoRot=true, idleTimer;
function resetIdle(){
  autoRot=false;
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>autoRot=true, 5000);
}
stage.addEventListener('mousedown',resetIdle);
stage.addEventListener('touchstart',resetIdle,{passive:true});

function autoRotate(){
  if(autoRot && mode==='3d' && !document.getElementById('ov').classList.contains('open')){
    rotY+=0.12;
    applyTransform();
  }
  requestAnimationFrame(autoRotate);
}
requestAnimationFrame(autoRotate);
